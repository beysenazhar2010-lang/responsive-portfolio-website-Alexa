<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портфолио | Ажар</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:linear-gradient(
        135deg,
        #38bdf8,
        #0ea5e9,
        #2563eb
    );
}

.container{
    width:100%;
    max-width:750px;
    background:white;
    border-radius:30px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
}

.hero{
    width:180px;
    margin-bottom:20px;
}

h1{
    font-size:42px;
    color:#0f172a;
    margin-bottom:10px;
}

.subtitle{
    color:#0284c7;
    font-size:22px;
    font-weight:600;
    margin-bottom:20px;
}

.description{
    color:#475569;
    font-size:18px;
    line-height:1.6;
    margin-bottom:35px;
}

.skills{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-bottom:35px;
}

.card{
    background:#e0f2fe;
    padding:20px;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
    color:#0f172a;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#0ea5e9;
    color:white;
    padding:14px 40px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.footer{
    margin-top:30px;
    color:#64748b;
    font-size:14px;
}

@media(max-width:600px){

.skills{
    grid-template-columns:1fr;
}

h1{
    font-size:32px;
}

.hero{
    width:140px;
}

}
</style>

</head>
<body>

<div class="container">

<img src="https://cdn-icons-png.flaticon.com/512/6062/6062646.png"
alt="Developer"
class="hero">

<h1>Ажар 👩‍💻</h1>

<p class="subtitle">Начинающий Frontend Developer</p>

<p class="description">
Изучаю веб-разработку и создаю современные сайты.
Осваиваю HTML, CSS, JavaScript и GitHub.
Это мое первое IT-портфолио 🚀
</p>

<div class="skills">

<div class="card">🌐 HTML5</div>

<div class="card">🎨 CSS3</div>

<div class="card">⚡ JavaScript</div>

<div class="card">💻 GitHub</div>

</div>

<a href="#" class="btn">
Telegram
</a>

<div class="footer">
2026 © Portfolio by Azhar
</div>

</div>

</body>
</html>
