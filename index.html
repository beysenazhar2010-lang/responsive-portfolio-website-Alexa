<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Ажар</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f172a !important; 
            color: #f8fafc !important;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        .avatar-container {
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .avatar-svg {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            background-color: #334155;
            padding: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #38bdf8 !important;
            font-weight: 800;
        }

        h3 {
            font-size: 1.3rem;
            color: #94a3b8 !important;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1 !important;
            margin-bottom: 30px;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 35px;
        }

        .tech-card {
            background: #0f172a;
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            color: #f8fafc;
        }

        .tech-card span {
            display: block;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .btn {
            display: inline-block;
            padding: 12px 40px;
            background: #38bdf8;
            color: #0f172a !important;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            transition: background 0.2s;
        }

        .btn:hover {
            background: #7dd3fc;
        }
    </style>
</head>
<body>

            </svg>
        </div>
