<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Ажар</title>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <style>
        body {
            background-color: #0f172a; /* Глубокий космический цвет */
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Блок с крутой картинкой компьютера */
        .hero-image-container {
            margin-bottom: 20px;
        }
        
        .hero-image {
            max-width: 280px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(56, 189, 248, 0.3));
            animation: float 4s ease-in-out infinite; /* Картинка будет плавно летать вверх-вниз */
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0;
            color: #38bdf8; /* Яркий голубой цвет */
            font-weight: 800;
        }

        h3 {
            font-size: 1.4rem;
            font-weight: 400;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1;
            max-width: 650px;
            margin: 0 auto 40px auto;
        }

        /* Новая секция с технологиями */
        .tech-section {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .tech-title {
            font-size: 1.2rem;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .tech-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .tech-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 1rem;
            color: #94a3b8;
        }

        .tech-item i {
            font-size: 2.5rem;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        /* Кнопки контактов */
        .links-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-image-container">
