<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Ажар</title>
    <style>
        /* Здесь мы делаем весь сайт одним сплошным цветом */
        body {
            background-color: #0f172a; /* Тёмно-синий цвет на весь экран */
            color: #f8fafc; /* Красивый белый цвет для текста */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #38bdf8; /* Голубой акцент для твоего имени */
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Кнопки для соцсетей */
        .links-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Привет, я Ажар</h1>
        <h3>Начинающий IT-специалист</h3>
        <p>
            Я только начинаю свой путь в мире информационных технологий. 
            Активно изучаю веб-разработку, создание интерфейсов и логику современных сайтов. 
            Это моя первая полноценная страница на GitHub и Vercel!
        </p>

        <div class="links-container">
            <a href="https://t.me/твой_юзернейм" target="_blank" class="btn">Telegram</a>
            <a href="https://instagram.com/твой_юзернейм" target="_blank" class="btn">Instagram</a>
        </div>
    </div>

</body>
</html>
