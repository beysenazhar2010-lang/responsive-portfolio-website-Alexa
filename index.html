<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Ажар</title>
    <style>
        body {
            background-color: #0f172a; 
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Блок с картинкой из репозитория */
        .hero-image-container {
            margin-bottom: 20px;
        }
        
        .hero-image {
            max-width: 200px;
            width: 100%;
            height: auto;
            border-radius: 50%; /* Сделает аватарку круглой */
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4);
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0;
            color: #38bdf8;
            font-weight: 800;
        }

        h3 {
            font-size: 1.5rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 40px;
        }

        /* Технологические карточки */
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tech-card {
            background: #1e293b;
            border: 1px solid #38bdf8;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.1rem;
        }

        .tech-card span {
            display: block;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-image-container">
            <img src="assets/img/perfil.png" alt="Разработчик" class="hero-image">
        </div>

        <h1>Привет, я Ажар 🚀</h1>
        <h3>Начинающий IT-специалист / Frontend Developer</h3>
        
        <p class="description">
            Я активно изучаю современные технологии веб-разработки, программирование 
            и проектирование интерфейсов, чтобы создавать крутые технологичные проекты!
        </p>

        <div class="tech-grid">
            <div class="tech-card">
                <span>💻</span>
                <b>HTML5 / CSS3</b>
            </div>
            <div class="tech-card">
                <span>⚡</span>
                <b>JavaScript</b>
            </div>
            <div class="tech-card">
                <span>🛠</span>
                <b>GitHub / Git</b>
            </div>
            <div class="tech-card">
                <span>⚙️</span>
                <b>Vercel Deploy</b>
            </div>
        </div>

        <div>
            <a href="#" class="btn">Связаться в Telegram</a>
        </div>
    </div>

</body>
</html>
