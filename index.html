<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Ажар</title>
    <style>
        body {
            background-color: #0f172a; 
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Блок с твоим новым белым аватаром */
        .hero-image-container {
            margin-bottom: 25px;
        }
        
        .hero-image {
            max-width: 160px;
            width: 100%;
            height: auto;
            border-radius: 50%; 
            background-color: #1e293b;
            border: 3px solid #38bdf8; /* Красивый неоновый ободок вокруг иконки */
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0;
            color: #38bdf8;
            font-weight: 800;
        }

        h3 {
            font-size: 1.5rem;
            color: #94a3b8;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 40px;
        }

        /* Технологические карточки */
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tech-card {
            background: #1e293b;
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 20px;
            font-size: 1.1rem;
            transition: border 0.3s;
        }

        .tech-card:hover {
            border-color: #38bdf8;
        }

        .tech-card span {
            display: block;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-image-container">
