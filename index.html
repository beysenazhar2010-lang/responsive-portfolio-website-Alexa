<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Ажар</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f172a !important; 
            color: #f8fafc !important;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        /* Блок для главной технологической картинки */
        .tech-banner-container {
            margin-bottom: 25px;
        }

        .tech-banner {
            width: 100%;
            max-width: 320px;
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(56, 189, 248, 0.2));
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #38bdf8 !important;
            font-weight: 800;
        }

        h3 {
            font-size: 1.3rem;
            color: #94a3b8 !important;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1 !important;
            margin-bottom: 30px;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 35px;
        }

        .tech-card {
            background: #0f172a;
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        /* Маленькие технологические иконки внутри карточек */
        .card-icon {
            width: 40px;
            height: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 40px;
            background: #38bdf8;
            color: #0f172a !important;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tech-banner-container">
            <img src="https://img.imagesverse.com/2026/06/developer-activity.png" alt="IT Иллюстрация" class="tech-banner">
        </div>

        <h1>Привет, я Ажар 🚀</h1>
        <h3>Начинающий Frontend Developer</h3>
        
        <p class="description">
            Я активно изучаю технологии веб-разработки, основы создания интерфейсов 
            и логику современных сайтов. Это мой первый рабочий проект!
        </p>

        <div class="tech-grid">
            <div class="tech-card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" class="card-icon" alt="HTML">
                HTML5 / CSS3
            </div>
            <div class="tech-card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" class="card-icon" alt="JS">
                JavaScript
            </div>
            <div class="tech-card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" class="card-icon" alt="Git" style="filter: invert(1);">
                GitHub / Git
            </div>
            <div class="tech-card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg" class="card-icon" alt="Vercel">
                Разработка
            </div>
        </div>

        <div>
            <a href="#" class="btn">Telegram</a>
        </div>
    </div>

</body>
</html>
